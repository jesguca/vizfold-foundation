# VizFold environment. Versions are inferred, not pinned: the constraints below
# are the real requirements and the solver derives a coherent stack from them.
#
#   cuda-version=12.8  the CUDA runtime must not exceed the driver. Delta's 570.x
#                      reports __cuda=12.8, and a 12.9 runtime makes OpenMM's CUDA
#                      platform fail Amber minimization even when torch matches it.
#   flash-attn>=2.7    openfold/model/primitives.py unpacks 5 values from
#                      unpad_input; earlier versions return 4.
#   deepspeed=*=cuda*  the plain build resolves to a CPU-only variant.
#   python=3.11        what this stack was solved and verified against.
#
# flash-attn and dm-tree come from conda-forge because their pip distributions
# need --no-build-isolation or a source build with no py311 wheel.

name: openfold-env
channels:
  - conda-forge
  - bioconda
  - pytorch
  - nvidia
dependencies:
  - cuda-version=12.8
  - cuda-nvcc
  - cuda-cudart-dev
  - gcc=12.4
  - python=3.11
  - pip
  - openmm
  - pdbfixer
  - pytorch-lightning
  - biopython
  - numpy
  - pandas
  - PyYAML
  - requests
  - scipy
  - tqdm
  - typing-extensions
  - wandb
  - modelcif==0.7
  - awscli
  - ml-collections
  - aria2
  - mkl
  - git
  - bioconda::hmmer
  - bioconda::hhsuite
  - bioconda::kalign2
  - deepspeed=*=cuda*
  - dm-tree
  - flash-attn>=2.7
  - pytorch-gpu
  - pip:
      - git+https://github.com/NVIDIA/dllogger.git
